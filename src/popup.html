<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 220px;
      padding: 16px;
      background: #f8f9fa;
    }
    h1 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #333; }
    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
    }
    .speed-control input[type="range"] {
      flex: 1;
      accent-color: #4361ee;
    }
    .guide {
      display: flex;
      justify-content: space-around;
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
    }
    .stop-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: #e74c3c;
      margin-top: 12px;
      transition: background 0.15s;
    }
    .stop-btn:hover { background: #c0392b; }
    #status {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Point to Scroll</h1>
  <div class="guide">
    <span>👆 Scroll up</span>
    <span>👇 Scroll down</span>
  </div>
  <div class="speed-control">
    <label for="speed">Speed</label>
    <input type="range" id="speed" min="1" max="15" value="6">
  </div>
  <button id="stop" class="stop-btn">Stop</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
