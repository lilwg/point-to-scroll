<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Wave — Camera Access</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
      color: #333;
    }
    .card {
      text-align: center;
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 400px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.5; }
    button {
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      background: #4361ee;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #3a56d4; }
    #status { margin-top: 20px; font-weight: 600; }
    .success { color: #2ec4b6; }
    .error { color: #e94560; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wave needs camera access</h1>
    <p>Click the button below and <strong>Allow</strong> when Chrome asks for camera permission. This only needs to be done once.</p>
    <button id="allow-btn">Allow Camera</button>
    <p id="status"></p>
  </div>
  <script src="camera-permission.js"></script>
</body>
</html>
